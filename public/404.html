<script>
    (function () {
        var status = document.querySelector("[data-system-status]");
        var value = document.querySelector("[data-system-status-value]");
        if (!status || !value) return;

        var label = "Checking";
        var state = "checking";
        var lastChecked = new Date();
        var canProbe = window.location.protocol === "http:" || window.location.protocol === "https:";

        function formatTime(date) {
            try {
                return new Intl.DateTimeFormat(document.documentElement.lang || "tr-TR", {
                    hour: "2-digit",
                    minute: "2-digit",
                    second: "2-digit"
                }).format(date);
            } catch (error) {
                return date.toLocaleTimeString();
            }
        }

        function render() {
            status.dataset.state = state;
            value.textContent = label + " · " + formatTime(lastChecked);
            status.setAttribute("aria-label", "System status: " + label + ". Last check " + formatTime(lastChecked));
        }

        function setStatus(nextState, nextLabel) {
            state = nextState;
            label = nextLabel;
            lastChecked = new Date();
            render();
        }

        async function probe() {
            if (navigator.onLine === false) {
                setStatus("offline", "Offline");
                return;
            }

            if (!canProbe || typeof fetch === "undefined" || typeof AbortController === "undefined") {
                setStatus("live", "Live");
                return;
            }

            var controller = new AbortController();
            var timeout = window.setTimeout(function () {
                controller.abort();
            }, 4000);

            try {
                var response = await fetch(window.location.origin + "/", {
                    method: "HEAD",
                    cache: "no-store",
                    signal: controller.signal
                });
                window.clearTimeout(timeout);
                setStatus(response.status < 500 ? "live" : "limited", response.status < 500 ? "Live" : "Degraded");
            } catch (error) {
                window.clearTimeout(timeout);
                setStatus("offline", "Offline");
            }
        }

        window.addEventListener("online", probe);
        window.addEventListener("offline", function () {
            setStatus("offline", "Offline");
        });

        render();
        probe();
        window.setInterval(render, 1000);
        window.setInterval(probe, 30000);
    })();
</script>
