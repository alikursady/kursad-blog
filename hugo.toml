baseURL = "https://kursadyanik.com/"
languageCode = "tr-TR"
defaultContentLanguage = "tr"
title = "Kürşad Yanık"
theme = "PaperMod"
buildFuture = false
enableRobotsTXT = true
rssLimit = 20
copyright = "© 2026 kursadyanik.com"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"

[frontmatter]
  lastmod = ["lastmod", "date", "publishDate"]

[params]
  env = "production"
  title = "Kürşad Yanık"
  mainSections = ["posts"]
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowShareButtons = false
  defaultTheme = "light"
  disableThemeToggle = false
  disableSpecial1stPost = true

  description = "Kürşad Yanık'ın siber güvenlik, OSINT, açık kaynak istihbaratı ve bilgi güvenliği üzerine araştırma notları."
  author = "Kürşad Yanık"
  keywords = ["siber güvenlik", "cybersecurity", "osint", "açık kaynak istihbaratı", "bilgi güvenliği", "kursadyanik", "Kürşad Yanık", "ctf", "güvenlik araştırması"]
  images = ["/images/anime-bg.jpg"]

  # Tarih formatı: gönderi ve listelerde (gg.aa.yyyy)
  DateFormat = "02.01.2006"

[params.label]
  text = "kursadyanik.com"

[params.assets]
  favicon = "favicon.ico"
  favicon16x16 = "favicon.ico"
  favicon32x32 = "favicon.ico"
  apple_touch_icon = "favicon.ico"
  safari_pinned_tab = "safari-pinned-tab.svg"
  theme_color = "#fafafa"
  msapplication_TileColor = "#fafafa"

[params.schema]
  publisherType = "Person"
  sameAs = ["https://github.com/alikursady"]

[menu]
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/"
    weight = 1

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 3

  [[menu.main]]
    identifier = "elsewhere"
    name = "Elsewhere"
    url = "/elsewhere/"
    weight = 4
