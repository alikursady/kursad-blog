baseURL = "https://kursadyanik.com/"
languageCode = "tr-TR"
defaultContentLanguage = "tr"
title = "kursadyanik.com"
theme = "PaperMod"
buildFuture = true
enableRobotsTXT = true
copyright = "© 2026 kursadyanik.com"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  env = "production"
  title = "kursadyanik.com"
  mainSections = ["posts"]
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowShareButtons = false
  defaultTheme = "light"
  disableThemeToggle = false
  disableSpecial1stPost = true

  description = "Siber güvenlik, OSINT, bilgi güvenliği ve araştırma notları."
  author = "kursad."
  keywords = ["siber güvenlik", "cybersecurity", "osint", "bilgi güvenliği", "kursadyanik", "blog", "ctf", "güvenlik araştırması"]
  images = ["images/anime-bg.jpg"]

  # Tarih formatı: gönderi ve listelerde (gg.aa.yyyy)
  DateFormat = "02.01.2006"


[params.assets]
  favicon = "favicon.ico"
  favicon16x16 = "favicon.ico"
  favicon32x32 = "favicon.ico"
  apple_touch_icon = "favicon.ico"
  safari_pinned_tab = "safari-pinned-tab.svg"
  theme_color = "#fafafa"
  msapplication_TileColor = "#fafafa"

[params.schema]
  publisherType = "Person"

[menu]
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/"
    weight = 1

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 3

  [[menu.main]]
    identifier = "elsewhere"
    name = "Elsewhere"
    url = "/elsewhere/"
    weight = 4
